# Render Blueprint — free web service + free Postgres
# Docs: https://render.com/docs/blueprint-spec
#
# After first deploy, set secrets in the Render dashboard:
#   APP_KEY, MAIL_PASSWORD, and any other mail credentials
# Free Postgres expires after 30 days unless upgraded.

databases:
  - name: portfolio-db
    plan: free
    databaseName: portfolio
    user: portfolio

services:
  - type: web
    name: michaela-portfolio
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: Michaela Verzosa
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      # Set after first deploy to your https://….onrender.com URL
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      # Laravel reads DB_URL (Render Internal Database URL)
      - key: DB_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: local
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_SCHEME
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        value: michaelaverzosa26@gmail.com
      - key: MAIL_FROM_ADDRESS
        value: michaelaverzosa26@gmail.com
      - key: MAIL_FROM_NAME
        value: Michaela Verzosa
      - key: CONTACT_MAIL_TO
        value: michaelaverzosa26@gmail.com
      # Set these as secret env vars in the Render dashboard (do not commit):
      # APP_KEY, MAIL_PASSWORD
      - key: APP_KEY
        sync: false
      - key: MAIL_PASSWORD
        sync: false
